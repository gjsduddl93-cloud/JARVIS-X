name: Daily Viral Shorts (15개/일)

on:
  schedule:
    - cron: '0 0 * * *'   # 09:00 KST
    - cron: '0 3 * * *'   # 12:00 KST
    - cron: '0 6 * * *'   # 15:00 KST
    - cron: '0 9 * * *'   # 18:00 KST
    - cron: '0 12 * * *'  # 21:00 KST
  workflow_dispatch:       # 수동 실행

jobs:
  create-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Render 콜드 스타트 깨우기 ───────────────────────────────────────────
      - name: Wake up Render service
        run: |
          echo "🔔 Render 콜드 스타트 대기 중..."
          curl -sf --max-time 60 "${{ secrets.RENDER_URL }}/health" || true
          sleep 20
          echo "⏰ 대기 완료"

      # ── 2. 헬스체크 ─────────────────────────────────────────────────────────────
      - name: Health check
        run: |
          HEALTH=$(curl -sf --max-time 30 "${{ secrets.RENDER_URL }}/health")
          echo "Health: $HEALTH"
          if ! echo "$HEALTH" | python3 -c "import sys,json; d=json.load(sys.stdin); exit(0 if d.get('status')=='ok' else 1)"; then
            echo "❌ 헬스체크 실패"
            exit 1
          fi
          echo "✅ 서비스 정상"

      # ── 3. 배치 영상 3개 시작 ───────────────────────────────────────────────────
      - name: Start batch (3개)
        id: batch
        run: |
          echo "🎬 배치 영상 제작 시작 (3개)..."
          RESP=$(curl -sf --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"count":3}' \
            "${{ secrets.RENDER_URL }}/batch-video")
          echo "Response: $RESP"

          IDS=$(echo "$RESP" | python3 -c "
import sys, json
d = json.load(sys.stdin)
print(' '.join(d.get('job_ids', [])))
")
          if [ -z "$IDS" ]; then
            echo "❌ job_ids 없음"
            exit 1
          fi
          echo "job_ids=$IDS" >> $GITHUB_OUTPUT
          echo "✅ 배치 시작: $IDS"

      # ── 4. 3개 job 완료까지 폴링 (최대 15분) ────────────────────────────────────
      - name: Poll all jobs until done
        run: |
          export RENDER_URL="${{ secrets.RENDER_URL }}"
          export JOB_IDS="${{ steps.batch.outputs.job_ids }}"

          python3 - << 'PYEOF'
import urllib.request, json, time, sys, os

base    = os.environ["RENDER_URL"]
job_ids = os.environ["JOB_IDS"].split()
done    = set()
errors  = set()
total   = len(job_ids)
start   = time.time()
MAX_SEC = 840   # 14분

print(f"🔄 {total}개 job 폴링 시작: {job_ids}")

while len(done) + len(errors) < total:
    elapsed = time.time() - start
    if elapsed > MAX_SEC:
        print(f"⏱ 타임아웃 ({MAX_SEC}초 초과)")
        sys.exit(1)

    for jid in job_ids:
        if jid in done or jid in errors:
            continue
        try:
            resp = urllib.request.urlopen(f"{base}/status/{jid}", timeout=15)
            d    = json.loads(resp.read())
            st   = d.get("status", "?")
            logs = d.get("logs", [])
            last = logs[-1] if logs else ""
            print(f"  [{jid[:8]}] {st} — {last}")

            if st == "done":
                yt  = (d.get("youtube") or {}).get("url", "")
                ttl = (d.get("content") or {}).get("title", "")
                print(f"  ✅ {jid[:8]} 완료! 제목: {ttl}")
                if yt:
                    print(f"  🔗 {yt}")
                done.add(jid)
            elif st == "error":
                err = d.get("error", "알 수 없음")
                print(f"  ❌ {jid[:8]} 실패: {err}")
                errors.add(jid)
        except Exception as e:
            print(f"  [{jid[:8]}] 폴링 오류: {e}")

    remaining = total - len(done) - len(errors)
    if remaining > 0:
        print(f"  ⏳ {remaining}개 진행 중... ({int(elapsed)}s 경과)")
        time.sleep(20)

print(f"\n{'='*40}")
print(f"🏁 배치 완료: 성공 {len(done)}개 / 실패 {len(errors)}개 / 합계 {total}개")
if errors:
    sys.exit(1)
PYEOF

      # ── 5. 완료 요약 ────────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo ""
          echo "📊 오늘의 자동화 결과"
          echo "🕐 완료 시각: $(date '+%Y-%m-%d %H:%M:%S UTC') (KST +9h)"
          STATS=$(curl -sf --max-time 10 "${{ secrets.RENDER_URL }}/stats" || echo "{}")
          echo "📈 오늘 통계: $STATS"
