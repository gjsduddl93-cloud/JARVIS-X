<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS-X</title>

<style>
body{
    margin:0;
    background:#f4f6f9;
    font-family:Arial, sans-serif;
}

.container{
    width:95%;
    max-width:1100px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.sub-title{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

.chat-box{
    background:white;
    height:620px;
    overflow-y:auto;
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.user{
    text-align:right;
    margin:12px 0;
}

.ai{
    text-align:left;
    margin:12px 0;
}

.bubble-user{
    display:inline-block;
    background:#0b84ff;
    color:white;
    padding:12px 16px;
    border-radius:18px;
    max-width:75%;
    word-break:break-word;
}

.bubble-ai{
    display:inline-block;
    background:#e9ecef;
    color:black;
    padding:12px 16px;
    border-radius:18px;
    max-width:75%;
    white-space:pre-line;
    word-break:break-word;
}

.quick-buttons{
    margin-top:15px;
    margin-bottom:15px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.quick-buttons form{
    display:inline;
}

.quick-buttons button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#ffffff;
    box-shadow:0 0 5px rgba(0,0,0,0.15);
}

.quick-buttons button:hover{
    background:#e9ecef;
}

.video-pkg-btn{
    background:#0b84ff !important;
    color:#fff !important;
    font-weight:bold;
}

.video-pkg-btn:hover{
    background:#0066cc !important;
}

.video-pkg-btn.running{
    background:#ff9500 !important;
    cursor:not-allowed;
}

.progress-bubble{
    white-space:pre-line;
    border-left:3px solid #0b84ff;
}

.input-area{
    display:flex;
    margin-top:15px;
}

.input-area input{
    flex:1;
    padding:14px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:10px;
}

.input-area button{
    width:120px;
    margin-left:10px;
    border:none;
    border-radius:10px;
    background:#0b84ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.loading{
    display:none;
    margin-top:10px;
    font-weight:bold;
    color:#333;
}

.reset-link{
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

    <h1>🚀 JARVIS-X</h1>
    <div class="sub-title">
        AI 콘텐츠 자동화 비서 · 월 10~50만원 부수입 목표
    </div>

    <div class="chat-box" id="chatBox">

        {% for item in history %}

            {% if item.role == "user" %}
                <div class="user">
                    <div class="bubble-user">
                        {{ item.content }}
                    </div>
                </div>
            {% endif %}

            {% if item.role == "assistant" %}
                <div class="ai">
                    <div class="bubble-ai">
                        {{ item.content }}
                    </div>
                </div>
            {% endif %}

        {% endfor %}

    </div>

    <div class="quick-buttons">

        <form method="POST">
            <button type="submit" name="question" value="GET_TRENDS">
                🔥 오늘의 트렌드
            </button>
        </form>

        <form method="POST">
            <button type="submit" name="question" value="MAKE_SHORTS">
                🎬 쇼츠 생성
            </button>
        </form>

        <button type="button" class="video-pkg-btn" onclick="startVideoPackage()">
            🎥 영상 제작 패키지
        </button>

        <form method="POST">
            <button type="submit" name="question" value="CONTENT_PACKAGE">
                📦 콘텐츠 패키지
            </button>
        </form>

        <form method="POST">
            <button type="submit" name="question" value="IMAGE_PROMPT">
                🖼 이미지 프롬프트
            </button>
        </form>

        <form method="POST">
            <button type="submit" name="question" value="MONEY_IDEAS">
                💰 수익 아이디어
            </button>
        </form>

        <form method="POST">
            <button type="submit" name="question" value="AI_NEWS">
                📰 AI 뉴스
            </button>
        </form>

        <form method="POST">
            <button type="submit" name="question" value="GLOBAL_ISSUES">
                🌍 해외 이슈
            </button>
        </form>

        <a href="/reset" class="reset-link">
            <button type="button">
                🗑 초기화
            </button>
        </a>

    </div>

    <form method="POST" id="chatForm" class="input-area">

        <input
            type="text"
            id="question"
            name="question"
            placeholder="예: AI로 자동 수익 만드는 방법 알려줘"
            autocomplete="off"
            required
        >

        <button type="submit">
            전송
        </button>

    </form>

    <div id="loading" class="loading">
        🤖 JARVIS-X 생각중...
    </div>

</div>

<script>
const chatBox = document.getElementById("chatBox");

if(chatBox){ chatBox.scrollTop = chatBox.scrollHeight; }

document.getElementById("question").addEventListener("keypress", function(e){
    if(e.key === "Enter"){ document.getElementById("chatForm").submit(); }
});

document.getElementById("chatForm").addEventListener("submit", function(){
    document.getElementById("loading").style.display = "block";
});

document.querySelectorAll(".quick-buttons form").forEach(function(form){
    form.addEventListener("submit", function(){
        document.getElementById("loading").style.display = "block";
    });
});

// ── 영상 제작 패키지 백그라운드 처리 ─────────────────────────────────────────
let _videoPolling = null;

function startVideoPackage() {
    const btn = document.querySelector(".video-pkg-btn");
    if(btn.classList.contains("running")) return;  // 중복 실행 방지

    btn.classList.add("running");
    btn.textContent = "⏳ 실행 중...";

    // 사용자 버블
    const userDiv = document.createElement("div");
    userDiv.className = "user";
    userDiv.innerHTML = '<div class="bubble-user">🎥 영상 제작 패키지</div>';
    chatBox.appendChild(userDiv);

    // AI 진행 버블
    const aiDiv = document.createElement("div");
    aiDiv.className = "ai";
    const bubble = document.createElement("div");
    bubble.className = "bubble-ai progress-bubble";
    bubble.textContent = "🎬 영상 제작 요청 중...";
    aiDiv.appendChild(bubble);
    chatBox.appendChild(aiDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    fetch("/start-video", { method: "POST" })
    .then(function(r){ return r.json(); })
    .then(function(data){
        const jobId = data.job_id;
        bubble.textContent = "🎬 작업 시작됨 (ID: " + jobId + ")\n⏳ 3초마다 자동 업데이트...";
        chatBox.scrollTop = chatBox.scrollHeight;

        _videoPolling = setInterval(function(){
            fetch("/status/" + jobId)
            .then(function(r){ return r.json(); })
            .then(function(job){
                const logs = (job.logs || []).join("\n");
                let msg = logs;

                if(job.status === "done"){
                    clearInterval(_videoPolling);
                    btn.classList.remove("running");
                    btn.textContent = "🎥 영상 제작 패키지";

                    if(job.content){
                        msg += "\n\n📋 제목: " + job.content.title;
                        msg += "\n📝 설명: " + job.content.description;
                        msg += "\n🏷 태그: " + (job.content.tags || []).join(", ");
                    }
                    if(job.youtube && job.youtube.status === "success"){
                        msg += "\n🔗 " + job.youtube.url;
                    }
                    msg += "\n\n✨ 완료!";

                    // 세션 히스토리에 저장
                    fetch("/save-chat", {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({user:"🎥 영상 제작 패키지", assistant: msg})
                    });

                } else if(job.status === "error"){
                    clearInterval(_videoPolling);
                    btn.classList.remove("running");
                    btn.textContent = "🎥 영상 제작 패키지";
                    msg += "\n\n❌ 오류: " + (job.error || "알 수 없는 오류");

                } else {
                    msg += "\n\n⏳ 진행 중... (자동 업데이트)";
                }

                bubble.textContent = msg;
                chatBox.scrollTop = chatBox.scrollHeight;
            })
            .catch(function(){ /* 폴링 오류 무시, 계속 시도 */ });
        }, 3000);
    })
    .catch(function(err){
        bubble.textContent = "❌ 요청 실패: " + err.message;
        btn.classList.remove("running");
        btn.textContent = "🎥 영상 제작 패키지";
    });
}
</script>

</body>
</html>
